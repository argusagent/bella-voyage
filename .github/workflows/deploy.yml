# Redundant Vercel deploy.
#
# Vercel's own Git integration is the primary path: connect the repo
# in the Vercel dashboard once and every push to master auto-deploys.
# This workflow is the safety net — if the Git integration ever
# disconnects, drifts, or silently no-ops, this Action still ships
# the build.
#
# To enable: add three secrets in GitHub → Settings → Secrets and
# variables → Actions:
#
#   VERCEL_TOKEN        a token from vercel.com/account/tokens
#   VERCEL_ORG_ID       printed by `vercel link` or in .vercel/project.json
#   VERCEL_PROJECT_ID   ditto
#
# Without those secrets, the workflow exits cleanly without deploying.

name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://bella-voyage.vercel.app

    steps:
      - name: Check Vercel credentials
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Vercel secrets not set — skipping. Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID under Settings → Secrets to enable redundant deploys."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Vercel CLI
        if: steps.gate.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        if: steps.gate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        if: steps.gate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to production
        if: steps.gate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed: $DEPLOY_URL"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
